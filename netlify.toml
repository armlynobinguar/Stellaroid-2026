# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Clear "Base directory" and "Publish directory" in the Netlify UI (Site settings →
# Build & deploy) so this file fully controls the build — mixed UI + file paths
# often cause empty deploys and the default "Page not found".

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback (also in public/_redirects); ensures index.html for non-file paths.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Netlify → Environment variables → VITE_API_BASE_URL = your API origin
# (no trailing slash), e.g. https://your-api.onrender.com
