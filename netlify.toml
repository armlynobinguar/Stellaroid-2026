# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Build runs from repo root OR from frontend/ depending on Netlify "Base directory".
# Do not set Base directory + publish to "frontend/dist" together (doubles the path).

[build]
  command = "if [ -f frontend/package.json ]; then npm ci --prefix frontend && npm run build --prefix frontend; else npm ci && npm run build; fi"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify → Environment variables → VITE_API_BASE_URL (API origin, no trailing slash)
