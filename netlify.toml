# Build from repo root. Clear Base / Publish / Build command in Netlify UI.
# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# For working /api on the live site: VITE_API_BASE_URL = https://your-express-host.example.com
# (no trailing slash). Vite injects it into the client; same value is used for dist/_redirects proxy.
# On your API host: FRONTEND_URL can be comma-separated, e.g.
#   http://localhost:5173,https://your-site.netlify.app

[build]
  command = "npm run netlify:build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
